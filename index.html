<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Registration Form</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Internal CSS */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', monospace;
            background: #fff;
            color: #000;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 4px solid #000;
            padding: 30px;
            box-shadow: 8px 8px 0 #000;
        }

        h1 {
            margin: 0 0 30px 0;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 4px solid #000;
            padding-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Feedback Registration</h1>
        
        <form id="feedbackForm" name="feedbackForm">
            <div class="form-group">
                <label for="studentName">Student Name<span class="required">*</span></label>
                <input type="text" id="studentName" name="studentName" placeholder="Enter your full name">
                <span class="error" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email ID<span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number<span class="required">*</span></label>
                <input type="tel" id="mobile" name="mobile" placeholder="Enter 10-digit mobile number">
                <span class="error" id="mobileError"></span>
            </div>

            <div class="form-group">
                <label for="department">Department<span class="required">*</span></label>
                <select id="department" name="department">
                    <option value="">-- Select Department --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                    <option value="Electrical">Electrical</option>
                </select>
                <span class="error" id="departmentError"></span>
            </div>

            <div class="form-group">
                <label>Gender<span class="required">*</span></label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Male" id="genderMale">
                        Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Female" id="genderFemale">
                        Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Other" id="genderOther">
                        Other
                    </label>
                </div>
                <span class="error" id="genderError"></span>
            </div>

            <div class="form-group">
                <label for="feedback">Feedback Comments<span class="required">*</span></label>
                <textarea id="feedback" name="feedback" rows="5" placeholder="Enter your feedback (minimum 10 words)"></textarea>
                <span class="error" id="feedbackError"></span>
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn">Submit</button>
                <button type="reset" id="resetBtn">Reset</button>
            </div>

            <div id="successMessage" class="success-message" style="display: none;">
                Form submitted successfully!
            </div>
        </form>
    </div>

    <script src="validation.js"></script>
</body>
</html>
